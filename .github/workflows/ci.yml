name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-home-cache: true

      - name: Run shared module tests
        run: ./gradlew :shared:jvmTest

      - name: Run server tests
        run: ./gradlew :server:test

      - name: Run StockScreen tests
        run: ./gradlew :composeApp:jvmTest --tests "com.yohai.mycoffee.ui.screens.StockScreenTest"

      - name: Build desktop JAR
        run: ./gradlew :composeApp:jvmJar
